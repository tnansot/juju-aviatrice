site_name: juju-aviatrice — Prépa pilote de ligne
site_description: Base documentaire et préparation aux concours pilote de ligne pour Juju (ENAC EPL, Cadets Air France, cadets européens).
site_author: Juju & Papa
site_url: https://juju-aviatrice.pages.dev

# TODO — à mettre à jour une fois le repo poussé sur GitHub :
# repo_url: https://github.com/<OWNER>/juju-aviatrice
# repo_name: juju-aviatrice
# edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: fr
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passer en mode clair
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - fr
        - en

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false

nav:
  - Accueil: README.md
  - Formations:
      - Comparatif: formations/comparatif.md
      - ENAC EPL: formations/01-enac-epl.md
      - Air France Cadets: formations/02-air-france-cadets.md
      - Écoles ATPL privées (France): formations/03-ecoles-privees-france.md
      - Lufthansa Group: formations/04-lufthansa-group.md
      - KLM Flight Academy: formations/05-klm-flight-academy.md
      - BA Speedbird: formations/06-british-airways-speedbird.md
      - easyJet Generation: formations/07-easyjet-generation.md
      - Ryanair Future Flyer: formations/08-ryanair-future-flyer.md
      - Wizz Air Pilot Academy: formations/09-wizz-air-academy.md
      - Brussels Airlines MPL: formations/10-brussels-airlines-mpl.md
      - Iberia & Vueling: formations/11-iberia-vueling.md
  - Prérequis:
      - Médical EASA Classe 1: prerequis/medical-classe-1.md
      - Académique, nationalité, anglais: prerequis/academique-nationalite-anglais.md
  - Épreuves:
      - Scientifiques (maths & physique): epreuves/scientifiques-maths-physique.md
      - Psychotechniques: epreuves/psychotechniques.md
      - Anglais & entretiens: epreuves/anglais-entretiens.md
  - Sources: sources.md
